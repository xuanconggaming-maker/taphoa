<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ Thống Hoa Quả - Cloud Sync</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
      :root {
        --primary: #1b5e20;
        --success: #43a047;
        --danger: #e53935;
        --info: #0288d1;
        --bg: #f1f8e9;
      }
      body {
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: var(--bg);
        margin: 0;
        overflow-x: hidden;
      }

      nav {
        background: var(--primary);
        color: white;
        padding: 10px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .nav-btns {
        display: flex;
        gap: 10px;
      }
      .nav-btns a,
      .nav-btns button {
        background: #2e7d32;
        color: white;
        border: none;
        padding: 10px 15px;
        cursor: pointer;
        border-radius: 5px;
        text-decoration: none;
        font-weight: bold;
        font-size: 13px;
      }

      .main-content {
        display: grid;
        grid-template-columns: 1fr 1.2fr;
        gap: 20px;
        padding: 20px;
      }
      .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
      }
      h3 {
        margin-top: 0;
        color: var(--primary);
        border-bottom: 2px solid #eee;
        padding-bottom: 10px;
      }

      .table-wrapper {
        flex: 1;
        overflow-y: auto;
        max-height: 400px;
        margin-top: 10px;
        border: 1px solid #eee;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }
      th {
        background: #f4f6f7;
        position: sticky;
        top: 0;
        padding: 12px;
        text-align: left;
      }
      td {
        padding: 12px;
        border-bottom: 1px solid #eee;
      }

      input {
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 10px;
      }
      .btn-add {
        background: var(--success);
        color: white;
        border: none;
        padding: 12px;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
      }

      .pay-section {
        background: #fffde7;
        padding: 20px;
        border-radius: 8px;
        margin-top: 20px;
        border: 1px solid #fbc02d;
        text-align: center;
      }

      /* Hỗ trợ xem điện thoại 9:16 */
      @media (max-width: 850px) {
        .main-content {
          grid-template-columns: 1fr;
        }
        nav {
          flex-direction: column;
          gap: 10px;
          text-align: center;
        }
        .nav-btns {
          width: 100%;
          justify-content: center;
        }
      }
      @media print {
        .no-print {
          display: none !important;
        }
      }
    </style>
  </head>
  <body>
    <nav class="no-print">
      <div style="font-size: 20px; font-weight: bold">🍎 HOA QUẢ ÁI CỬ</div>
      <div class="nav-btns">
        <a href="index.html" style="background: #546e7a">🏢 Về Tạp Hóa</a>
        <button onclick="openAdmin()" style="background: var(--info)">
          📊 Doanh Thu
        </button>
      </div>
    </nav>

    <div class="main-content no-print">
      <div class="card">
        <h3>📦 Nhập Kho (Kg)</h3>
        <input type="text" id="inName" placeholder="Tên loại trái cây" />
        <input type="number" id="inPrice" placeholder="Giá bán / 1kg" />
        <input
          type="number"
          id="inQty"
          step="0.1"
          placeholder="Số lượng kg nhập"
        />
        <button class="btn-add" onclick="saveInv()">+ Nhập hàng</button>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Tên</th>
                <th>Giá/Kg</th>
                <th>Tồn</th>
                <th>Xóa</th>
              </tr>
            </thead>
            <tbody id="invTableBody"></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h3>🛒 Cân Ký & Bán</h3>
        <input
          type="text"
          id="shopSearch"
          placeholder="🔍 Tìm trái cây..."
          onkeyup="searchProduct()"
        />
        <div
          id="searchList"
          style="
            background: white;
            border: 1px solid #ddd;
            display: none;
            position: absolute;
            z-index: 10;
            width: 90%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
          "
        ></div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Tên</th>
                <th>Kg</th>
                <th>Thành tiền</th>
                <th>Xóa</th>
              </tr>
            </thead>
            <tbody id="cartTableBody"></tbody>
          </table>
        </div>
        <div class="pay-section">
    <h1 style="color: var(--danger); margin:0;">TỔNG: <span id="totalLabel">0</span>đ</h1>
    
    <div style="margin: 15px 0; display: flex; justify-content: center; gap: 20px;">
        <label style="cursor:pointer"><input type="radio" name="payMethod" value="Tiền mặt" checked onclick="toggleQR(false)"> 💵 Tiền mặt</label>
        <label style="cursor:pointer"><input type="radio" name="payMethod" value="Chuyển khoản" onclick="toggleQR(true)"> 💳 Chuyển khoản</label>
    </div>

    <div id="qrArea" style="display:none; margin-bottom: 15px; padding: 10px; border: 1px dashed #ccc; border-radius: 10px; background: #fff;">
        <p style="font-size: 13px; font-weight: bold; color: #003d71; margin-bottom: 5px;">Ngân hàng MB - CU Y AI</p>
        <img id="qrImg" src="" style="width: 200px; border-radius: 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
        <p style="font-size: 11px; color: #666; margin-top: 5px;">STK: 0386823702</p>
    </div>

    <button class="btn-add" style="background: #27ae60; font-size: 18px;" onclick="finishSale()">✅ ĐÃ NHẬN TIỀN & XUẤT ĐƠN</button>
    <button class="btn-add" style="background: #34495e; margin-top:5px;" onclick="copyInvoice()">📋 COPY ĐƠN</button>
</div>
    <footer
      class="no-print"
      style="
        text-align: center;
        padding: 20px;
        color: #7f8c8d;
        border-top: 1px solid #eee;
      "
    >
      <p>© 2026 Bản quyền thuộc về Tạp Hóa ÁI CỬ</p>
    </footer>

    <script>
      // --- CHÌA KHÓA FIREBASE CỦA BẠN ---
      const firebaseConfig = {
        apiKey: "AIzaSyA6OpgeqkYidXxlHQ1jhreVjagpzJ6F6II",
        authDomain: "hoa-qua-70ecd.firebaseapp.com",
        databaseURL: "https://hoa-qua-70ecd-default-rtdb.firebaseio.com",
        projectId: "hoa-qua-70ecd",
        storageBucket: "hoa-qua-70ecd.firebasestorage.app",
        messagingSenderId: "434483280531",
        appId: "1:434483280531:web:2ce63fcddf3cdf2c28eb66",
      };

      firebase.initializeApp(firebaseConfig);
      const database = firebase.database();

      let db = { products: [], sales: [] };
      let cart = [];

      // Tự động tải dữ liệu từ Cloud mỗi khi có thay đổi
      database.ref("hoaqua_data").on("value", (snap) => {
        const data = snap.val();
        if (data) {
          db = data;
          if (!db.sales) db.sales = [];
          renderInv();
        }
      });

      function saveInv() {
        const name = document.getElementById("inName").value.trim();
        const price = parseInt(document.getElementById("inPrice").value);
        const qty = parseFloat(document.getElementById("inQty").value);

        if (!name || isNaN(price) || isNaN(qty))
          return alert("Vui lòng nhập đủ thông tin!");
        if (!db.products) db.products = [];

        // KIỂM TRA TRÙNG TÊN
        const existingProduct = db.products.find(
          (p) => p.name.toLowerCase() === name.toLowerCase(),
        );

        if (existingProduct) {
          // Cộng dồn số Kg
          existingProduct.qty = parseFloat(
            (existingProduct.qty + qty).toFixed(2),
          );
          existingProduct.price = price;
          alert(`Đã cộng dồn thêm ${qty}kg vào [${name}]`);
        } else {
          db.products.push({ name, price, qty });
        }

        updateCloud();
        document.getElementById("inName").value = "";
        document.getElementById("inPrice").value = "";
        document.getElementById("inQty").value = "";
      }

      function renderInv() {
        if (!db.products) return;
        document.getElementById("invTableBody").innerHTML = db.products
          .map(
            (p, i) => `
            <tr><td>${p.name}</td><td>${p.price.toLocaleString()}</td><td><b>${p.qty}kg</b></td>
            <td onclick="deleteItem(${i})" style="color:red; cursor:pointer">✖</td></tr>
        `,
          )
          .join("");
      }

      function deleteItem(i) {
        if (confirm("Xóa loại quả này khỏi kho?")) {
          db.products.splice(i, 1);
          updateCloud();
        }
      }

      function searchProduct() {
        const key = document.getElementById("shopSearch").value.toLowerCase();
        const list = document.getElementById("searchList");
        if (!key) {
          list.style.display = "none";
          return;
        }
        const matches = db.products.filter((p) =>
          p.name.toLowerCase().includes(key),
        );
        list.innerHTML = matches
          .map(
            (p) => `
            <div style="padding:12px; border-bottom:1px solid #eee; cursor:pointer" onclick="addCart('${p.name}')">
                ${p.name} - ${p.price.toLocaleString()}đ/kg (Tồn: ${p.qty}kg)
            </div>
        `,
          )
          .join("");
        list.style.display = "block";
      }

      function addCart(name) {
        const p = db.products.find((x) => x.name === name);
        const qty = parseFloat(
          prompt(`Nhập số Kg khách mua cho [${p.name}]:`, 1),
        );
        if (isNaN(qty) || qty <= 0) return;
        if (qty > p.qty) return alert("Kho không đủ hàng!");
        cart.push({
          name: p.name,
          price: p.price,
          qty: qty,
          total: Math.round(p.price * qty),
          idx: db.products.indexOf(p),
        });
        document.getElementById("searchList").style.display = "none";
        document.getElementById("shopSearch").value = "";
        renderCart();
      }

      function renderCart() {
        let total = 0;
        document.getElementById("cartTableBody").innerHTML = cart
          .map((c, i) => {
            total += c.total;
            return `<tr><td>${c.name}</td><td>${c.qty}kg</td><td>${c.total.toLocaleString()}</td><td onclick="cart.splice(${i},1);renderCart()">✖</td></tr>`;
          })
          .join("");
        document.getElementById("totalLabel").innerText =
          total.toLocaleString();
      }
      function toggleQR(show) {
    const qrArea = document.getElementById('qrArea');
    const qrImg = document.getElementById('qrImg');
    const totalText = document.getElementById('totalLabel').innerText.replace(/,/g, '');
    const total = parseInt(totalText);
    
    if (show && total > 0) {
        // Lấy số thứ tự đơn hàng hiện tại từ database, nếu chưa có thì bắt đầu từ 1
        // Định dạng số thành chuỗi 6 chữ số (ví dụ: 000001)
        const orderNum = (db.orderCount || 0) + 1;
        const orderCode = orderNum.toString().padStart(6, '0');
        
        // Tạo link QR với nội dung là mã đơn hàng
        const qrUrl = `https://img.vietqr.io/image/mb-0386823702-compact2.jpg?amount=${total}&addInfo=DH${orderCode}&accountName=CU Y AI`;
        
        qrImg.src = qrUrl;
        qrArea.style.display = 'block';
        // Lưu mã tạm thời để tí nữa lưu vào lịch sử sale
        window.currentOrderCode = "DH" + orderCode;
    } else {
        qrArea.style.display = 'none';
    }
}

      function finishSale() {
    if (cart.length === 0) return alert("Giỏ hàng trống!");
    
    const method = document.querySelector('input[name="payMethod"]:checked').value;
    const now = new Date();
    
    // Tăng số thứ tự đơn hàng
    if (!db.orderCount) db.orderCount = 0;
    db.orderCount += 1;
    const orderCode = db.orderCount.toString().padStart(6, '0');

    // QUAN TRỌNG: Xác định nội dung hiển thị
    // Nếu là Chuyển khoản thì hiện mã DH000... - Nếu là Tiền mặt thì hiện "Tiền mặt"
    const paymentNote = (method === "Chuyển khoản") ? "DH" + orderCode : "Tiền mặt";

    const sale = {
        timestamp: now.getTime(),
        timeStr: now.toLocaleString(),
        orderId: paymentNote, // Lưu nội dung này vào database
        total: cart.reduce((a, b) => a + b.total, 0),
        items: cart.map(c => `${c.name}(${c.qty})`).join(', '),
        method: method
    };

    // ... (phần trừ kho và db.sales.push giữ nguyên) ...
    db.sales.push(sale);
    updateCloud();
    alert("Thanh toán thành công: " + paymentNote);
    
    cart = []; renderCart(); toggleQR(false);
}

      function copyInvoice() {
        if (cart.length === 0) return alert("Giỏ hàng trống!");
        let text =
          "--- HÓA ĐƠN HOA QUẢ ---\n" +
          cart
            .map((c) => `${c.name} x ${c.qty}kg: ${c.total.toLocaleString()}đ`)
            .join("\n");
        text +=
          "\nTỔNG CỘNG: " +
          document.getElementById("totalLabel").innerText +
          " VNĐ";
        text += "\n\n© 2026 Bản quyền thuộc về Tên Của Bạn";
        navigator.clipboard
          .writeText(text)
          .then(() => alert("Đã copy hóa đơn kèm thương hiệu!"));
      }

      function updateCloud() {
        database.ref("hoaqua_data").set(db);
      }

      function openAdmin() {
        const pass = prompt("Nhập mật khẩu quản lý:");
        if (pass !== "123") return alert("Sai mật khẩu!");

        // 1. Tính toán số liệu doanh thu
        const now = new Date();
        const startOfDay = new Date(now.setHours(0, 0, 0, 0)).getTime();

        // Tính đầu tuần (Thứ 2)
        const dayOfWeek = now.getDay() || 7;
        const startOfWeek = new Date(
          now.setDate(now.getDate() - dayOfWeek + 1),
        ).setHours(0, 0, 0, 0);

        // Tính đầu tháng và đầu năm
        const startOfMonth = new Date(
          now.getFullYear(),
          now.getMonth(),
          1,
        ).getTime();
        const startOfYear = new Date(now.getFullYear(), 0, 1).getTime();

        let sumDay = 0,
          sumWeek = 0,
          sumMonth = 0,
          sumYear = 0;

        (db.sales || []).forEach((s) => {
          const t = s.timestamp;
          if (t >= startOfDay) sumDay += s.total;
          if (t >= startOfWeek) sumWeek += s.total;
          if (t >= startOfMonth) sumMonth += s.total;
          if (t >= startOfYear) sumYear += s.total;
        });

        // 2. Tạo giao diện hiển thị 4 ô thống kê và bảng lịch sử
        let reportHtml = `
        <div id="reportModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#f4f7f6; z-index:9999; padding:20px; overflow-y:auto; font-family:sans-serif;">
            <div style="max-width:1000px; margin:auto; background:white; padding:20px; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.1);">
                <button onclick="document.getElementById('reportModal').remove()" style="float:right; padding:8px 15px; background:#e74c3c; color:white; border:none; border-radius:5px; cursor:pointer;">ĐÓNG [X]</button>
                <h2 style="color:#2c3e50; text-align:center;">📊 BÁO CÁO DOANH THU TỔNG HỢP</h2>
                
                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:15px; margin-bottom:30px;">
                    <div style="background:#3498db; color:white; padding:20px; border-radius:10px; text-align:center;">
                        <div style="font-size:14px; opacity:0.8;">HÔM NAY</div>
                        <div style="font-size:24px; font-weight:bold;">${sumDay.toLocaleString()}đ</div>
                    </div>
                    <div style="background:#27ae60; color:white; padding:20px; border-radius:10px; text-align:center;">
                        <div style="font-size:14px; opacity:0.8;">TUẦN NÀY</div>
                        <div style="font-size:24px; font-weight:bold;">${sumWeek.toLocaleString()}đ</div>
                    </div>
                    <div style="background:#f39c12; color:white; padding:20px; border-radius:10px; text-align:center;">
                        <div style="font-size:14px; opacity:0.8;">THÁNG NÀY</div>
                        <div style="font-size:24px; font-weight:bold;">${sumMonth.toLocaleString()}đ</div>
                    </div>
                    <div style="background:#8e44ad; color:white; padding:20px; border-radius:10px; text-align:center;">
                        <div style="font-size:14px; opacity:0.8;">NĂM ${now.getFullYear()}</div>
                        <div style="font-size:24px; font-weight:bold;">${sumYear.toLocaleString()}đ</div>
                    </div>
                </div>

                <h3>📜 Lịch sử giao dịch</h3>
                <div style="overflow-x:auto;">
                    
<table border="1" style="width:100%; border-collapse:collapse; border-color:#eee;">
    <thead>
        <tr style="background:#f8f9fa;">
            <th style="padding:12px;">Thời gian</th>
            <th style="padding:12px;">Nội dung/Mã đơn</th> <th style="padding:12px;">Chi tiết sản phẩm</th>
            <th style="padding:12px;">Thành tiền</th>
        </tr>
    </thead>
    <tbody>
        ${(db.sales || []).slice().reverse().map(s => `
            <tr>
                <td style="padding:10px; border-bottom:1px solid #eee;">${s.timeStr}</td>
                <td style="padding:10px; border-bottom:1px solid #eee; font-weight:bold; color:#e67e22;">
                    ${s.orderId || s.method || '---'} 
                </td>
                <td style="padding:10px; border-bottom:1px solid #eee;">${s.items}</td>
                <td style="padding:10px; border-bottom:1px solid #eee; font-weight:bold;">${s.total.toLocaleString()}đ</td>
            </tr>
        `).join('')}
    </tbody>
</table>
                </div>
            </div>
        </div>
    `;
        document.body.insertAdjacentHTML("beforeend", reportHtml);
      }
    </script>
  </body>
</html>
