<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tạp Hóa Ái Cử</title>
    <link rel="stylesheet" href="style-index.css" />
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
  </head>
  <body>
    <nav>
      <div class="logo">
        <span class="logo-icon">🏪</span>
        <span>TẠP HÓA ÁI CỬ</span>
      </div>
      <a href="admin.html" class="btn-admin">⚙️ Quản Lý</a>
    </nav>

    <div class="main-content">
      <section class="left-side">
        <div class="banner-slider">
          <img
            class="slide"
            src="https://images.unsplash.com/photo-1604719312566-8fa20658f1e1?auto=format&fit=crop&q=80&w=1000&h=300"
            alt="Khuyến mãi 1"
          />
          <img
            class="slide"
            src="https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&q=80&w=1000&h=300"
            alt="Khuyến mãi 2"
          />
          <div class="banner-overlay">Khuyến Mãi Hôm Nay 🔥</div>
        </div>

        <div class="search-container">
          <input
            type="text"
            id="search"
            placeholder="🔍 Tìm kiếm sản phẩm (vd: bánh, kẹo)..."
            oninput="renderProducts()"
          />
        </div>

        <div id="productGrid" class="grid"></div>
      </section>

      <section class="right-side">
        <div class="cart-box">
          <h3>🛒 Giỏ hàng của bạn</h3>
          <div id="cartItems" class="cart-list"></div>
          <div class="total-box">
            <span>Tổng thanh toán:</span>
            <span id="totalText" class="total-price">0đ</span>
          </div>

          <div class="payment-actions">
            <p>Chọn phương thức thanh toán</p>
            <button class="btn-pay cash" onclick="handlePay('Tiền mặt')">
              💵 TIỀN MẶT
            </button>
            <button class="btn-pay qr" onclick="showQR()">
              🖼️ QUYÉT MÃ QR
            </button>
          </div>
        </div>
      </section>
    </div>

    <div id="qrModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Quét mã để thanh toán</h3>
        </div>
        <p id="qrInfo" class="qr-info-text"></p>
        <div class="qr-image-wrapper">
          <img id="qrImg" src="" alt="VietQR" />
        </div>
        <div class="qr-memo-box">
          <span>Nội dung chuyển khoản:</span>
          <b id="qrMemo"></b>
        </div>
        <div class="modal-btns">
          <button class="btn-confirm-pay" onclick="handlePay('Chuyển khoản')">
            XÁC NHẬN ĐÃ CHUYỂN
          </button>
          <button class="btn-close-modal" onclick="closeQR()">HỦY</button>
        </div>
      </div>
    </div>

    <script src="script-index.js"></script>
  </body>
</html>
