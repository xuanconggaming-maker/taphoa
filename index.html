<!doctype html>
<html lang="vi">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bán Hàng Tạp Hóa</title>
    <link rel="stylesheet" href="style-index.css" />
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
  </head>
  <body>
    <nav>
      <div class="logo">🏪 TẠP HÓA 4.0</div>
      <a href="admin.html" class="btn-admin">⚙️ QUẢN LÝ</a>
    </nav>
    <div class="main-content">
      <section class="left-side">
        <input
          type="text"
          id="search"
          placeholder="🔍 Tìm kiếm sản phẩm..."
          oninput="renderProducts()"
        />
        <div id="productGrid" class="grid"></div>
      </section>
      <section class="right-side">
        <h3>🛒 Giỏ hàng</h3>
        <div id="cartItems" class="cart-list"></div>
        <div class="total">Tổng: <span id="totalText">0đ</span></div>

        <div class="payment-actions">
          <p>Chọn phương thức thanh toán:</p>
          <button class="btn-pay cash" onclick="handlePay('Tiền mặt')">
            💵 TIỀN MẶT
          </button>
          <button class="btn-pay qr" onclick="showQR()">🖼️ QUYÉT MÃ QR</button>
        </div>
      </section>
    </div>

    <div id="qrModal" class="modal">
      <div class="modal-content">
        <h3>Quét mã để thanh toán</h3>
        <p id="qrInfo"></p>
        <img id="qrImg" src="" alt="VietQR" />
        <p class="qr-memo-box">Nội dung chuyển khoản: <b id="qrMemo"></b></p>

        <div class="modal-btns">
          <button class="btn-confirm-pay" onclick="handlePay('Chuyển khoản')">
            XÁC NHẬN ĐÃ CHUYỂN
          </button>
          <button class="btn-close-modal" onclick="closeQR()">HỦY</button>
        </div>
      </div>
    </div>

    <script src="script-index.js"></script>
  </body>
</html>
